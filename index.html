<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>手刀串燒｜點餐紀錄</title>
  <meta name="theme-color" content="#7f1d1d" />
  <style>
    :root{
      --bg:#f8f3ea;
      --card:#fffaf3;
      --ink:#1c1917;
      --muted:#78716c;
      --line:#e7ded2;
      --main:#7f1d1d;
      --main2:#991b1b;
      --dark:#1c1917;
      --green:#059669;
      --amber:#fff7ed;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}
    body{min-height:100vh}
    button,input,textarea,select{font:inherit}
    button{border:0;cursor:pointer}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:96px}
    header{position:sticky;top:0;z-index:20;background:rgba(248,243,234,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:16px}
    .headrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-size:12px;font-weight:900;letter-spacing:.22em;color:var(--main)}
    h1{font-size:26px;line-height:1.15;margin:4px 0 0;font-weight:950}
    .countBox{background:var(--dark);color:white;border-radius:18px;padding:10px 14px;text-align:center;min-width:76px}
    .countBox small{display:block;color:#d6d3d1;font-size:11px}
    .countBox b{font-size:24px}
    .staffBox{margin-top:8px;display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--main);border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950}
    .staffBox button{background:transparent;color:var(--main);padding:0;font-size:12px;font-weight:950;text-decoration:underline}
    main{padding:14px;display:flex;flex-direction:column;gap:14px}
    .card{background:rgba(255,250,243,.94);border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:0 6px 18px rgba(28,25,23,.04)}
    .sectionTitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .sectionTitle b{font-size:16px}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;background:#fff;color:var(--muted);white-space:nowrap}
    .pill.active{background:var(--dark);color:white}
    .tableGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tableBtn{border-radius:16px;padding:12px 6px;font-weight:950;background:#f1ede6;color:#44403c}
    .tableBtn.active{background:var(--main);color:white}
    .searchWrap{position:relative}
    .searchWrap input{width:100%;border:1px solid var(--line);background:white;border-radius:24px;padding:15px 44px 15px 42px;outline:none}
    .searchIcon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#a8a29e}
    .clearSearch{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:#f5f1ea;color:#57534e;font-weight:900}
    .catScroll{
      position:sticky;
      top:var(--sticky-top, 88px);
      z-index:19;
      display:flex;
      gap:8px;
      overflow:auto;
      margin:0 -14px;
      padding:8px 14px 10px;
      background:rgba(248,243,234,.96);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(231,222,210,.9);
      box-shadow:0 8px 18px rgba(28,25,23,.05);
    }
    .catScroll::-webkit-scrollbar{display:none}
    .quickGrid{display:grid;grid-template-columns:1fr 96px;gap:8px}
    .input,.textarea{width:100%;border:1px solid var(--line);background:white;border-radius:16px;padding:12px;outline:none}
    .textarea{min-height:84px;resize:none}
    .primary{width:100%;background:var(--main);color:white;border-radius:16px;padding:14px;font-weight:950}
    .primary:active,.dark:active,.tableBtn:active,.qtyBtn:active{transform:scale(.98)}
    .dark{width:100%;background:var(--dark);color:white;border-radius:16px;padding:15px;font-weight:950}
    .subtle{background:#f1ede6;color:#57534e;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:950}
    .menuHead{display:flex;align-items:flex-end;justify-content:space-between}
    .menuHead h2{margin:0;font-size:19px}
    .menuHead p{margin:3px 0 0;color:var(--muted);font-size:12px;font-weight:700}
    .hint{font-size:12px;color:var(--muted);font-weight:800}
    .menuList{display:flex;flex-direction:column;gap:8px}
    .item{background:white;border:1px solid var(--line);border-radius:24px;padding:13px;box-shadow:0 5px 12px rgba(28,25,23,.03)}
    .item.selected{outline:2px solid var(--main)}
    .itemTop{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .itemInfo{min-width:0;flex:1}
    .tag{display:inline-flex;background:#f5f1ea;color:#78716c;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;margin-bottom:5px}
    .itemName{font-size:16px;font-weight:950;line-height:1.25}
    .price{color:var(--main);font-weight:950;margin-top:4px;font-size:14px}
    .qty{display:flex;align-items:center;gap:8px}
    .qtyBtn{width:39px;height:39px;border-radius:50%;background:#f1ede6;color:#44403c;font-size:22px;font-weight:800;line-height:1}
    .qtyBtn.plus{background:var(--dark);color:white}
    .qtyNum{width:28px;text-align:center;font-size:20px;font-weight:950}
    .itemNote{margin-top:10px}
    .itemNote input{width:100%;border:1px solid var(--line);background:#faf7f1;border-radius:15px;padding:11px;outline:none;font-size:14px}
    .variantBox{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .variantBtn{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f5f1ea;border:1px solid var(--line);border-radius:16px;padding:10px 12px;font-weight:950;color:#44403c}
    .variantBtn b{font-size:14px}
    .variantBtn span{font-size:13px;color:var(--main)}
    .variantInfo{display:flex;flex-direction:column;gap:2px}
    .variantQty{display:flex;align-items:center;gap:8px}
    .variantQtyBtn{width:34px;height:34px;border-radius:50%;background:white;color:#44403c;font-size:20px;font-weight:950;border:1px solid var(--line);line-height:1}
    .variantQtyBtn.plus{background:var(--dark);color:white;border-color:var(--dark)}
    .variantQtyNum{width:24px;text-align:center;font-size:17px;font-weight:950}
    .variantHint{margin-top:8px;font-size:12px;color:var(--muted);font-weight:800}
    .cartLineTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .cartRemove{flex:0 0 auto;border-radius:999px;background:#fff;color:#7f1d1d;border:1px solid var(--line);padding:5px 8px;font-size:12px;font-weight:950}

    .cartFab{position:fixed;right:max(14px,calc((100vw - 520px)/2 + 14px));bottom:84px;z-index:35;display:flex;align-items:center;gap:8px;background:var(--main);color:white;border-radius:999px;padding:10px 12px;box-shadow:0 12px 28px rgba(28,25,23,.22);font-weight:950}
    .cartFabIcon{font-size:18px;line-height:1}
    .cartFabCount{display:grid;place-items:center;min-width:24px;height:24px;border-radius:999px;background:white;color:var(--main);font-size:13px;padding:0 6px}
    .cartFabTotal{font-size:12px;color:#fff7ed;max-width:88px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cartBackdrop{position:fixed;inset:0;z-index:45;background:rgba(28,25,23,.36);backdrop-filter:blur(2px)}
    .cartBar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:55;width:min(520px,100%);padding:0 14px calc(14px + env(safe-area-inset-bottom))}
    .cartPanel{background:white;border:1px solid var(--line);border-radius:26px 26px 0 0;padding:14px;box-shadow:0 -18px 45px rgba(28,25,23,.2);max-height:72vh;display:flex;flex-direction:column}
    .cartTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
    .cartTop small{display:block;color:var(--main);font-weight:950}
    .cartTop b{font-size:20px}
    .cartActions{display:flex;align-items:center;gap:8px}
    .cartList{max-height:38vh;overflow:auto;background:#faf7f1;border-radius:16px;padding:10px;margin-bottom:10px}
    .cartLine{border-bottom:1px solid var(--line);padding:6px 0}
    .cartLine:last-child{border-bottom:0}
    .cartLineMain{display:flex;justify-content:space-between;gap:10px;font-size:14px;font-weight:900}
    .cartNote{font-size:12px;color:var(--main);font-weight:800;margin-top:3px}
    nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:40;width:min(520px,100%);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .tab{position:relative;border-radius:17px;background:#f1ede6;color:#57534e;padding:12px 8px;font-weight:950}
    .tab.active{background:var(--dark);color:white}
    .badge{position:absolute;right:-3px;top:-5px;min-width:21px;height:21px;border-radius:999px;background:var(--main);color:white;font-size:11px;display:grid;place-items:center;padding:0 5px}
    .hidden{display:none!important}
    .empty{min-height:280px;display:grid;place-items:center;text-align:center;color:var(--muted);background:rgba(255,255,255,.7);border:1px dashed #d6cfc5;border-radius:26px;font-weight:900}
    .orderCard{background:white;border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:0 5px 14px rgba(28,25,23,.04);display:flex;flex-direction:column;gap:10px}
    .orderTop{display:flex;justify-content:space-between;gap:12px}
    .tableBadge{display:inline-flex;background:var(--dark);color:white;border-radius:999px;padding:6px 12px;font-weight:950;font-size:14px}
    .stationBadge{display:inline-flex;background:#fff1f2;color:var(--main);border:1px solid #fecdd3;border-radius:999px;padding:6px 10px;font-weight:950;font-size:13px;margin-left:5px}
    .stationFilters{display:flex;gap:8px;overflow:auto;margin:8px -2px 12px;padding:2px}
    .stationFilters::-webkit-scrollbar{display:none}
    .meta{font-size:12px;color:var(--muted);font-weight:700;margin-top:5px}
    .orderTotal{font-size:18px;color:var(--main);font-weight:950}
    .orderItems{background:#faf7f1;border-radius:16px;padding:10px}
    .orderLine{border-bottom:1px solid var(--line);padding:7px 0}
    .orderLine:first-child{padding-top:0}
    .orderLine:last-child{border-bottom:0;padding-bottom:0}
    .orderLineMain{display:flex;justify-content:space-between;gap:10px;font-size:14px;font-weight:950}
    .orderLine.done{opacity:.52}
    .orderLine.done .orderLineMain span:first-child{text-decoration:line-through}
    .orderItemTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .itemDoneBtn{flex:0 0 auto;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:950}
    .itemDoneBtn.done{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
    .orderActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .doneBtn{background:var(--green);color:white;border-radius:16px;padding:13px;font-weight:950}
    .deleteBtn,.restoreBtn,.copyBtn{background:#f1ede6;color:#57534e;border-radius:16px;padding:13px;font-weight:950}
    .restoreBtn{background:var(--dark);color:white}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:2px}
    .toolbar h2{margin:0;font-size:20px}
    .smallDanger{background:white;color:#7f1d1d;border:1px solid var(--line);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:950}
    .toast{position:fixed;left:50%;bottom:155px;transform:translateX(-50%);z-index:60;background:var(--dark);color:white;border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;box-shadow:0 12px 30px rgba(28,25,23,.2)}
    @media (max-width:360px){
      .tableGrid{grid-template-columns:repeat(3,1fr)}
      h1{font-size:23px}
      .itemName{font-size:15px}
    }
    @media print{
      header,nav,.cartBar,.cartFab,.cartBackdrop,.searchWrap,.catScroll,.card,.toolbar .smallDanger{display:none!important}
      .app{max-width:none;padding:0}
      main{display:block}
      .hidden{display:none!important}
      body{background:white}
      .orderCard{break-inside:avoid;border:1px solid #000;box-shadow:none;margin-bottom:8px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="headrow">
        <div>
          <div class="brand">手刀串燒</div>
          <h1>手機點餐紀錄</h1>
          <div class="staffBox">點單人：<span id="staffNameLabel">外場</span><button id="changeStaffName" type="button">更換</button></div>
        </div>
        <div class="countBox">
          <small>未出餐</small>
          <b id="pendingCount">0</b>
        </div>
      </div>
    </header>

    <main>
      <section id="pageOrder">
        <div class="card">
          <div class="sectionTitle">
            <b>桌號</b>
            <span class="pill" id="currentTable">目前：A1</span>
          </div>
          <div class="tableGrid" id="tableGrid"></div>
        </div>

        <div style="height:12px"></div>

        <div class="searchWrap">
          <span class="searchIcon">⌕</span>
          <input id="searchInput" placeholder="搜尋餐點、酒水、分類" autocomplete="off" />
          <button id="clearSearch" class="clearSearch hidden">×</button>
        </div>

        <div style="height:12px"></div>

        <div class="catScroll" id="categoryBar"></div>

        <div style="height:12px"></div>

        <div class="card">
          <div class="sectionTitle">
            <b>臨時加點 / 手寫品項</b>
          </div>
          <div class="quickGrid">
            <input class="input" id="quickName" placeholder="例如：客製酒款" />
            <input class="input" id="quickPrice" placeholder="金額" inputmode="numeric" />
          </div>
          <div style="height:8px"></div>
          <select class="input" id="quickStation" aria-label="臨時加點出單位置">
            <option value="吧檯單">吧檯單</option>
            <option value="烤台單">烤台單</option>
            <option value="飲料單">飲料單</option>
          </select>
          <div style="height:10px"></div>
          <button class="primary" id="quickSubmit">直接送出臨時加點</button>
        </div>

        <div style="height:12px"></div>

        <div class="menuHead">
          <div>
            <h2 id="menuTitle">全部</h2>
            <p id="menuCount">共 0 個品項</p>
          </div>
          <div class="hint">串燒皆以 1 串計</div>
        </div>

        <div style="height:10px"></div>
        <div class="menuList" id="menuList"></div>
      </section>

      <section id="pagePending" class="hidden"></section>
      <section id="pageHistory" class="hidden"></section>
    </main>

    <button class="cartFab hidden" id="cartFab" aria-label="開啟本次點單">
      <span class="cartFabIcon">🛒</span>
      <span class="cartFabCount" id="cartFabCount">0</span>
      <small class="cartFabTotal" id="cartFabTotal">NT$0</small>
    </button>

    <div class="cartBackdrop hidden" id="cartBackdrop"></div>

    <div class="cartBar hidden" id="cartBar">
      <div class="cartPanel">
        <div class="cartTop">
          <div>
            <small id="cartTable">A1 本次點單</small>
            <b id="cartSummary">0 份・NT$0</b>
          </div>
          <div class="cartActions">
            <button class="subtle" id="clearCart">清除</button>
            <button class="subtle" id="cartClose">收起</button>
          </div>
        </div>
        <div class="cartList" id="cartList"></div>
        <button class="dark" id="submitOrder">送出訂單</button>
      </div>
    </div>

    <nav>
      <div class="tabs">
        <button class="tab active" data-tab="order">點餐</button>
        <button class="tab" data-tab="pending">未出餐 <span class="badge hidden" id="navBadge">0</span></button>
        <button class="tab" data-tab="history">紀錄</button>
      </div>
    </nav>
  </div>

  <div class="toast hidden" id="toast">已複製</div>

  <script type="module">

    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {

      projectId: "shutou-order",

      {id:"beef-tongue-scallion",name:"蔥塩牛舌",category:"串燒－牛",price:90},

      {id:"chicken-negi",name:"雞肉蔥串",category:"串燒－雞",price:80},

      if(!item) return "";
      if(item.name.includes("－")){

      }
      return item.name;
    }

    function isVariantChild(id){
      return VARIANT_GROUPS.some(group => group.variants.includes(id));
    }

    function groupQty(group){
      return group.variants.reduce((sum, id) => sum + (state.cart[id] || 0), 0);
    }

    function groupPriceText(group){
      return group.variants.map(id => {
        const item = variantItem(id);
        if(!item) return "";
        const label = variantLabel(item);
        return `${label}${money(item.price).replace("NT$","$")}`;
      }).filter(Boolean).join(" / ");
    }

    function displayMenuItems(source){
      const grouped = [];
      const used = new Set();

      source.forEach(item => {
        const group = VARIANT_GROUPS.find(g => g.variants.includes(item.id));
        if(group){
          if(!used.has(group.id)){
            grouped.push({...group, type:"variant-group"});
            used.add(group.id);
          }
        }else{
          grouped.push(item);
        }
      });

      return grouped;
    }

    const STORAGE_KEY = "shutou-kushiyaki-ordering-html-v1";
    let state = {
      tab:"order",
      cartOpen:false,
      table:"A1",
      category:"全部",
      stationFilter:"全部",
      keyword:"",
      cart:{},
      itemNotes:{},
      expandedGroups:{},
      orders:[]

    const $ = (id)=>document.getElementById(id);

    function normalizeOrders(data){
      if(!data) return [];
      const arr = Array.isArray(data) ? data.filter(Boolean) : Object.entries(data).map(([key, value]) => ({ firebaseKey:key, ...value }));
      return arr
        .map(o => ({
          ...o,
          id: o.id || o.firebaseKey || `ORD-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          station: o.station || stationOf(o.items?.[0] || {}) || "未分類",
          items: Array.isArray(o.items) ? o.items.map(item => ({...item, done: !!item.done})) : [],
          createdAtMs: Number(o.createdAtMs || 0)
        }))
        .sort((a,b)=>(b.createdAtMs || 0) - (a.createdAtMs || 0));
    }
    function load(){
      try{
        const backup = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
        if(Array.isArray(backup.orders)) {
          state.orders = backup.orders.map(o => ({
            ...o,
            station: o.station || stationOf(o.items?.[0] || {}) || "未分類",
            items: Array.isArray(o.items) ? o.items.map(item => ({...item, done: !!item.done})) : []
          }));
        }
      }catch(e){}

      onValue(ordersRef, snapshot=>{
        firebaseReady = true;
        state.orders = normalizeOrders(snapshot.val());
        localStorage.setItem(STORAGE_KEY, JSON.stringify({orders:state.orders}));
        render();
      }, error=>{
        console.error(error);
        showToast("同步連線失敗，請檢查網路");
      });
    }
    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({orders:state.orders}));
    }
    function firebaseOrderRef(id){
      return ref(db, `${ORDERS_PATH}/${id}`);
    }
    function syncOrder(order){
      save();
      return set(firebaseOrderRef(order.id), order).catch(error=>{
        console.error(error);
        showToast("同步失敗，請檢查網路");
      });
    }
    function syncDeleteOrder(id){
      save();
      return remove(firebaseOrderRef(id)).catch(error=>{
        console.error(error);
        showToast("刪除同步失敗");
      });
    }
    function syncClearOrders(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({orders:[]}));
      return remove(ordersRef).catch(error=>{
        console.error(error);
        showToast("清空同步失敗");
      });
    }
    function money(n){
      n = Number(n||0);
      if(n===0) return "時價/備註";
      return "NT$" + n.toLocaleString("zh-TW");
    }
    function nowLabel(){
      return new Date().toLocaleString("zh-TW",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    }
    function orderNo(){
      const d = new Date();
      return String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0")+String(d.getSeconds()).padStart(2,"0");
    }
    function categories(){
      return ["全部", ...Array.from(new Set(MENU.map(i=>i.category)))];
    }
    function stationOf(item){
      const drinkCats = ["啤酒","日本燒酎","調酒沙瓦","果實酒 / 清酒","日本果實酒","日本清酒","威士忌","威士忌蘇打","無酒精飲料","其他"];
      const barCats = ["下酒菜 / 沙拉","下酒菜","沙拉","名物主食","炸物","特色料理 / 湯品","湯品"];
      const barIds = ["beef-stew","butter-mushroom","sake-clams","seafood-miso-soup","tonkotsu-veggie-soup"];
      const grillIds = ["fish-dried","hamachi-kama","salted-mackerel"];
      if(drinkCats.includes(item.category)) return "飲料單";
      if(barCats.includes(item.category) || barIds.includes(item.id)) return "吧檯單";
      if((item.category || "").startsWith("串燒") || grillIds.includes(item.id)) return "烤台單";
      return "吧檯單";
    }
    function filteredMenu(){
      const k = state.keyword.trim().toLowerCase();
      return MENU.filter(i=>{
        const mc = state.category==="全部" || i.category===state.category;
        const group = VARIANT_GROUPS.find(g => g.variants.includes(i.id));
        const groupName = group ? group.name.toLowerCase() : "";
        const mk = !k || i.name.toLowerCase().includes(k) || i.category.toLowerCase().includes(k) || groupName.includes(k);
        return mc && mk;
      });
    }
    function cartItems(){
      return Object.entries(state.cart).map(([id,qty])=>{
        const item = MENU.find(i=>i.id===id);
        if(!item || qty<=0) return null;
        return {...item, qty, station:stationOf(item), note:(state.itemNotes[id]||"").trim(), subtotal:Number(item.price||0)*qty};
      }).filter(Boolean);
    }
    function cartTotal(){
      return cartItems().reduce((s,i)=>s+i.subtotal,0);
    }
    function pendingOrders(){
      return state.orders.filter(o=>o.status==="pending");
    }
    function doneOrders(){
      return state.orders.filter(o=>o.status==="done");
    }
    function changeQty(id, delta){
      const next = Math.max(0, (state.cart[id]||0)+delta);
      if(next===0){
        delete state.cart[id];
        delete state.itemNotes[id];
      }else{
        state.cart[id]=next;
      }
      render();
    }
    function removeCartItem(id){
      delete state.cart[id];
      delete state.itemNotes[id];
      render();
    }
    function setItemNote(id,value){
      state.itemNotes[id]=value;
      renderCart();
    }
    function switchTab(tab){
      state.tab=tab;
      if(tab !== "order") state.cartOpen=false;
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
      $("pageOrder").classList.toggle("hidden", tab!=="order");
      $("pagePending").classList.toggle("hidden", tab!=="pending");
      $("pageHistory").classList.toggle("hidden", tab!=="history");
      render();
      window.scrollTo({top:0,behavior:"smooth"});
    }

      lines.push(`桌號：${order.tableNo}`);
      lines.push(`單別：${order.station || "未分類"}`);
      if(order.staff) lines.push(`點單人：${order.staff}`);
      lines.push(`單號：#${order.no}`);
      lines.push(`時間：${order.createdAt}`);
      lines.push(`---`);
      order.items.forEach(i=>{
        lines.push(`${i.name} × ${i.qty}　${money(i.subtotal)}`);
        if(i.note) lines.push(`  備註：${i.note}`);
      });
      lines.push(`---`);
      lines.push(`合計：${money(order.total)}`);
      return lines.join("\\n");
    }
    async function copyOrder(id){
      const order = state.orders.find(o=>o.id===id);
      if(!order) return;
      const text = orderText(order);
      try{
        await navigator.clipboard.writeText(text);
        showToast("訂單已複製");
      }catch(e){
        prompt("複製訂單文字：", text);
      }
    }
    function submitOrder(){
      const items = cartItems();
      if(!items.length) return;
      const note = "";
      const no = orderNo();
      const createdAt = nowLabel();
      const createdAtMs = Date.now();
      const stationOrder = ["烤台單","吧檯單","飲料單"];
      const groups = {};
      items.forEach(item => {
        const station = item.station || stationOf(item);
        if(!groups[station]) groups[station] = [];
        groups[station].push(item);
      });
      const newOrders = stationOrder
        .filter(station => groups[station]?.length)
        .map((station, index) => {
          const groupItems = groups[station];
          return {
            id:`ORD-${createdAtMs}-${index}-${Math.random().toString(16).slice(2)}`,
            no,
            station,
            tableNo:state.table,
            staff:staffName,
            createdAt,
            createdAtMs:createdAtMs + index,
            items:groupItems.map(item => ({...item, done:false})),
            note,
            total:groupItems.reduce((sum,item)=>sum+Number(item.subtotal||0),0),
            status:"pending"
          };
        });
      state.orders = [...newOrders, ...state.orders];
      newOrders.forEach(order => syncOrder(order));
      state.cart={};
      state.itemNotes={};
      state.cartOpen=false;
      
      save();
      switchTab("pending");
    }
    function quickSubmit(){
      const name = $("quickName").value.trim();
      const price = Number(($("quickPrice").value||"").replace(/[^0-9]/g,"")) || 0;
      const station = $("quickStation")?.value || "吧檯單";
      if(!name){showToast("請輸入品項");return}
      const item = {id:"custom-"+Date.now(), name, category:"臨時加點", station, price, qty:1, note:"", subtotal:price};
      const createdAtMs = Date.now();
      const order = {
        id:"Q-"+createdAtMs+"-"+Math.random().toString(16).slice(2),
        no:orderNo(),
        station,
        tableNo:state.table,
        staff:staffName,
        createdAt:nowLabel(),
        createdAtMs,
        items:[{...item, done:false}],
        note:"臨時加點",
        total:price,
        status:"pending"
      };
      state.orders.unshift(order);
      syncOrder(order);
      $("quickName").value="";
      $("quickPrice").value="";
      save();
      switchTab("pending");
    }
    function markDone(id){
      let changed = null;
      state.orders = state.orders.map(o=>{
        if(o.id!==id) return o;
        changed = {...o,status:"done",doneAt:nowLabel(),items:o.items.map(item=>({...item,done:true}))};
        return changed;
      });
      if(changed) syncOrder(changed);
      save();
      render();
    }
    function toggleItemDone(orderId, itemKey){
      let changed = null;
      state.orders = state.orders.map(order=>{
        if(order.id !== orderId) return order;
        const items = order.items.map((item, index)=>{
          const key = `${item.id}-${index}`;
          if(key !== itemKey) return item;
          return {...item, done:!item.done};
        });
        const allDone = items.length > 0 && items.every(item=>item.done);
        changed = {
          ...order,
          items,
          status: allDone ? "done" : "pending",
          doneAt: allDone ? nowLabel() : ""
        };
        return changed;
      });
      if(changed) syncOrder(changed);
      save();
      render();
    }
    function restoreOrder(id){
      let changed = null;
      state.orders = state.orders.map(o=>{
        if(o.id!==id) return o;
        changed = {...o,status:"pending",doneAt:"",items:o.items.map(item=>({...item,done:false}))};
        return changed;
      });
      if(changed) syncOrder(changed);
      save();
      render();
    }
    function deleteOrder(id){
      if(!confirm("確定刪除這張訂單嗎？")) return;
      state.orders = state.orders.filter(o=>o.id!==id);
      syncDeleteOrder(id);
      save();
      render();
    }
    function clearAllOrders(){
      if(!confirm("確定要清空全部訂單紀錄嗎？這個動作無法復原。")) return;
      state.orders=[];
      syncClearOrders();
      render();
    }
    function renderTables(){
      $("tableGrid").innerHTML = TABLES.map(t=>`<button class="tableBtn ${state.table===t?'active':''}" data-table="${t}">${t}</button>`).join("");
      $("currentTable").textContent = "目前：" + state.table;
      document.querySelectorAll("[data-table]").forEach(btn=>{
        btn.onclick=()=>{state.table=btn.dataset.table;renderTables();renderCart();}
      });
    }
    function renderCategories(){
      $("categoryBar").innerHTML = categories().map(c=>`<button class="pill ${state.category===c?'active':''}" data-cat="${c}">${c}</button>`).join("");
      document.querySelectorAll("[data-cat]").forEach(btn=>{
        btn.onclick=()=>{state.category=btn.dataset.cat;renderMenu();renderCategories();}
      });
    }
    function renderMenu(){
      const list = displayMenuItems(filteredMenu());
      $("menuTitle").textContent = state.category;
      $("menuCount").textContent = `共 ${list.length} 個品項`;
      $("menuList").innerHTML = list.map(item=>{
        if(item.type === "variant-group"){
          const qty = groupQty(item);
          const expanded = !!state.expandedGroups[item.id];
          return `
            <div class="item ${qty>0?'selected':''}">
              <div class="itemTop">
                <div class="itemInfo">
                  <div class="tag">${item.category}</div>
                  <div class="itemName">${item.name}</div>
                  <div class="price">${groupPriceText(item)}</div>
                </div>
                <div class="qty">
                  <div class="qtyNum">${qty}</div>
                  <button class="qtyBtn plus" data-group="${item.id}">${expanded ? "−" : "+"}</button>
                </div>
              </div>
              ${expanded ? `
                <div class="variantBox">
                  ${item.variants.map(id=>{
                    const variant = variantItem(id);
                    if(!variant) return "";
                    const label = variantLabel(variant);
                    return `
                      <div class="variantBtn">
                        <div class="variantInfo">
                          <b>${label}</b>
                          <span>${money(variant.price)}</span>
                        </div>
                        <div class="variantQty">
                          <button class="variantQtyBtn" data-minus="${id}">−</button>
                          <div class="variantQtyNum">${state.cart[id] || 0}</div>
                          <button class="variantQtyBtn plus" data-plus="${id}">+</button>
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
                <div class="variantHint">使用右側 ＋ / － 調整數量</div>
              ` : ""}
            </div>
          `;
        }

        const qty = state.cart[item.id]||0;
        return `
          <div class="item ${qty>0?'selected':''}">
            <div class="itemTop">
              <div class="itemInfo">
                <div class="tag">${item.category}</div>
                <div class="itemName">${item.name}</div>
                <div class="price">${money(item.price)}</div>
              </div>
              <div class="qty">
                <button class="qtyBtn" data-minus="${item.id}">−</button>
                <div class="qtyNum">${qty}</div>
                <button class="qtyBtn plus" data-plus="${item.id}">+</button>
              </div>
            </div>
            ${qty>0 ? `<div class="itemNote"><input data-note="${item.id}" value="${escapeHtml(state.itemNotes[item.id]||"")}" placeholder="此品項備註：例不要蔥、鹽烤、先出"></div>` : ""}
          </div>
        `;
      }).join("");

      document.querySelectorAll("[data-group]").forEach(b=>{
        b.onclick=()=>{
          state.expandedGroups[b.dataset.group] = !state.expandedGroups[b.dataset.group];
          renderMenu();
        };
      });
      document.querySelectorAll("[data-plus]").forEach(b=>b.onclick=()=>changeQty(b.dataset.plus,1));
      document.querySelectorAll("[data-minus]").forEach(b=>b.onclick=()=>changeQty(b.dataset.minus,-1));
      document.querySelectorAll("[data-note]").forEach(inp=>{
        inp.oninput=()=>setItemNote(inp.dataset.note, inp.value);
      });
    }

    function renderCart(){
      const items = cartItems();
      const qty = items.reduce((s,i)=>s+i.qty,0);
      const total = cartTotal();
      const hasItems = items.length > 0;
      if(!hasItems) state.cartOpen = false;
      const showFab = state.tab === "order" && hasItems;
      const showDrawer = showFab && state.cartOpen;
      $("cartFab").classList.toggle("hidden", !showFab);
      $("cartBackdrop").classList.toggle("hidden", !showDrawer);
      $("cartBar").classList.toggle("hidden", !showDrawer);
      $("cartFabCount").textContent = qty;
      $("cartFabTotal").textContent = money(total);
      $("cartTable").textContent = `${state.table} 本次點單`;
      $("cartSummary").textContent = `${qty} 份・${money(total)}`;
      $("cartList").innerHTML = items.map(i=>`
        <div class="cartLine">
          <div class="cartLineTop">
            <div style="min-width:0;flex:1">
              <div class="cartLineMain"><span>${i.name} × ${i.qty}</span><span>${money(i.subtotal)}</span></div>
              ${i.note ? `<div class="cartNote">備註：${escapeHtml(i.note)}</div>` : ""}
            </div>
            <button class="cartRemove" data-remove-cart="${i.id}">刪除</button>
          </div>
        </div>
      `).join("");
      document.querySelectorAll("[data-remove-cart]").forEach(b=>{
        b.onclick=()=>removeCartItem(b.dataset.removeCart);
      });
    }
    function renderOrders(){
      const pending = pendingOrders();
      const shownPending = state.stationFilter === "全部" ? pending : pending.filter(o => (o.station || "未分類") === state.stationFilter);
      const done = doneOrders();
      $("pendingCount").textContent = pending.length;
      $("navBadge").textContent = pending.length;
      $("navBadge").classList.toggle("hidden", pending.length===0);

      $("pagePending").innerHTML = renderOrderPage("未出餐訂單", shownPending, false, pending);
      $("pageHistory").innerHTML = `
        <div class="toolbar">
          <div><h2>已完成紀錄</h2><div class="hint">當日收尾可清空</div></div>
          <button class="smallDanger" id="clearAll">清空全部</button>
        </div>
        ${renderOrderCards(done, true)}
      `;

      document.querySelectorAll("[data-station-filter]").forEach(b=>{
        b.onclick=()=>{
          state.stationFilter=b.dataset.stationFilter;
          renderOrders();
        };
      });
      document.querySelectorAll("[data-item-done]").forEach(b=>b.onclick=()=>toggleItemDone(b.dataset.itemDone, b.dataset.itemKey));
      document.querySelectorAll("[data-done]").forEach(b=>b.onclick=()=>markDone(b.dataset.done));
      document.querySelectorAll("[data-restore]").forEach(b=>b.onclick=()=>restoreOrder(b.dataset.restore));
      document.querySelectorAll("[data-delete]").forEach(b=>b.onclick=()=>deleteOrder(b.dataset.delete));
      document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>copyOrder(b.dataset.copy));
      const clear = $("clearAll");
      if(clear) clear.onclick=clearAllOrders;
    }
    function stationCount(orders, station){
      if(station === "全部") return orders.length;
      return orders.filter(o => (o.station || "未分類") === station).length;
    }
    function renderStationFilters(allPending){
      const filters = ["全部","烤台單","吧檯單","飲料單"];
      return `
        <div class="stationFilters">
          ${filters.map(f=>`
            <button class="pill ${state.stationFilter===f?'active':''}" data-station-filter="${f}">
              ${f} ${stationCount(allPending, f)}
            </button>
          `).join("")}
        </div>
      `;
    }
    function renderOrderPage(title, orders, history, allPending = orders){
      return `
        <div class="toolbar">
          <div><h2>${title}</h2><div class="hint">已依烤台 / 吧檯 / 飲料自動分單</div></div>
        </div>
        ${renderStationFilters(allPending)}
        ${renderOrderCards(orders, history)}
      `;
    }
    function renderOrderCards(orders, history){
      if(!orders.length){
        return `<div class="empty">目前沒有資料</div>`;
      }
      return orders.map(order=>`
        <div class="orderCard">
          <div class="orderTop">
            <div>
              <span class="tableBadge">${order.tableNo}</span><span class="stationBadge">${order.station || "未分類"}</span>
              <div class="meta">#${order.no}｜${order.staff ? "點單："+escapeHtml(order.staff)+"｜" : ""}建立：${order.createdAt}${order.doneAt ? "｜完成："+order.doneAt : ""}</div>
            </div>
            <div class="orderTotal">${money(order.total)}</div>
          </div>
          <div class="orderItems">
            ${order.items.map((i,index)=>{
              const itemKey = `${i.id}-${index}`;
              const isDone = !!i.done || history;
              return `
                <div class="orderLine ${isDone ? "done" : ""}">
                  <div class="orderItemTop">
                    <div style="min-width:0;flex:1">
                      <div class="orderLineMain"><span>${i.name} × ${i.qty}</span><span>${money(i.subtotal)}</span></div>
                      ${i.note ? `<div class="cartNote">單品備註：${escapeHtml(i.note)}</div>` : ""}
                    </div>
                    ${!history ? `<button class="itemDoneBtn ${isDone ? "done" : ""}" data-item-done="${order.id}" data-item-key="${itemKey}">${isDone ? "還原" : "完成"}</button>` : ""}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
          <div class="orderActions">
            ${history
              ? `<button class="restoreBtn" data-restore="${order.id}">還原</button>`
              : `<button class="doneBtn" data-done="${order.id}">完成</button>`
            }
            <button class="copyBtn" data-copy="${order.id}">複製</button>
          </div>
          <button class="deleteBtn" data-delete="${order.id}">刪除</button>
        </div>
      `).join("");
    }
    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
    }
    function render(){
      renderTables();
      renderCategories();
      renderMenu();
      renderCart();
      renderOrders();
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===state.tab));
      $("pageOrder").classList.toggle("hidden", state.tab!=="order");
      $("pagePending").classList.toggle("hidden", state.tab!=="pending");
      $("pageHistory").classList.toggle("hidden", state.tab!=="history");
    }

    function updateStickyTop(){
      const header = document.querySelector("header");
      if(header){
        document.documentElement.style.setProperty("--sticky-top", `${Math.ceil(header.getBoundingClientRect().height)}px`);
      }
    }
    window.addEventListener("resize", updateStickyTop);
    window.addEventListener("orientationchange", updateStickyTop);
    updateStickyTop();

    load();
    render();
    $("staffNameLabel").textContent = staffName;
    $("changeStaffName").onclick=()=>{
      const next = prompt("請輸入你的名字（例如：Amber / 外場1 / 外場2）", staffName);
      if(next && next.trim()){
        staffName = next.trim();
        localStorage.setItem("shutou-staff-name", staffName);
        $("staffNameLabel").textContent = staffName;
        showToast("點單人已更新");
      }
    };

    $("searchInput").addEventListener("input", e=>{
      state.keyword=e.target.value;
      $("clearSearch").classList.toggle("hidden", !state.keyword);
      renderMenu();
    });
    $("clearSearch").onclick=()=>{
      state.keyword="";
      $("searchInput").value="";
      $("clearSearch").classList.add("hidden");
      renderMenu();
    };
    $("quickPrice").addEventListener("input", e=>{
      e.target.value=e.target.value.replace(/[^0-9]/g,"");
    });
    $("quickSubmit").onclick=quickSubmit;
    $("submitOrder").onclick=submitOrder;
    $("cartFab").onclick=()=>{
      state.cartOpen=true;
      renderCart();
    };
    $("cartBackdrop").onclick=()=>{
      state.cartOpen=false;
      renderCart();
    };
    $("cartClose").onclick=()=>{
      state.cartOpen=false;
      renderCart();
    };
    $("clearCart").onclick=()=>{
      state.cart={};
      state.itemNotes={};
      state.cartOpen=false;
      render();
    };
    document.querySelectorAll(".tab").forEach(btn=>{
      btn.onclick=()=>switchTab(btn.dataset.tab);
    });
  </script>
</body>
</html>
